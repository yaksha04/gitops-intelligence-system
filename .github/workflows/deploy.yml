name: 🚀 GitOps Intelligence Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  risk-assessment:
    name: 🧠 AI Risk Assessment
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install Dependencies
      run: |
        pip install scikit-learn pandas numpy joblib python-dotenv requests google-generativeai mlflow

    - name: 📊 Extract Git Metrics
      id: metrics
      run: |
        METRICS=$(python scripts/extract_metrics.py)
        echo "metrics=$METRICS" >> $GITHUB_OUTPUT
        echo "📊 Metrics extracted: $METRICS"

    - name: 🧠 Run ML Risk Assessment
      id: risk
      run: |
        echo "Running risk prediction..."
        python ml_model/predict.py '${{ steps.metrics.outputs.metrics }}' || true
        RISK=$(python -c "
        import json, sys
        sys.path.insert(0, '.')
        metrics = json.loads('${{ steps.metrics.outputs.metrics }}')
        from ml_model.predict import predict_risk
        result = predict_risk(metrics)
        print(json.dumps(result))
        ")
        echo "risk_result=$RISK" >> $GITHUB_OUTPUT
        echo "🎯 Risk Result: $RISK"

    - name: 🚦 Risk Gate Check
      run: |
        python -c "
        import json, sys
        risk = json.loads('${{ steps.risk.outputs.risk_result }}')
        score = risk['risk_score']
        status = risk['status']
        print(f'Risk Score: {score}%')
        print(f'Status: {status}')
        print(f'Recommendation: {risk[\"recommendation\"]}')
        if status == 'HIGH_RISK':
            print('::error::🚨 HIGH RISK DEPLOYMENT BLOCKED! Score: ' + str(score) + '%')
            sys.exit(1)
        else:
            print('✅ Risk check passed!')
        "

    - name: 🤖 AI Code Review (PRs only)
      if: github.event_name == 'pull_request'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
      run: |
        python llm_services/code_reviewer.py

    - name: 📝 Generate Release Notes (main branch only)
      if: github.ref == 'refs/heads/main'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        mkdir -p releases
        python llm_services/release_notes.py

    - name: ✅ Deploy
      if: success()
      run: |
        echo "🚀 All checks passed!"
        echo "✅ Deploying application..."
        echo "Deployed at $(date)"
